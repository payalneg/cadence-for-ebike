# Bring-up "pinscan" firmware #1 — RTT logging + GPIO LED sweep + INT read.
# Pure GPIO; UART/I2C/SPI drivers disabled so their pins are free for direct GPIO probing.
CONFIG_GPIO=y
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_I2C=n
CONFIG_SPI=n

# Console/printk over SEGGER RTT (via J-Link), no UART pins used.
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_PRINTK=y
CONFIG_LOG=n
