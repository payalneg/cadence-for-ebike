# ===== BK6LS cadence sensor — nRF52810 (24 KB RAM), lean BLE peripheral =====

# --- Bluetooth core ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="BK6LS-Cadence"
# 1157 = Cycling: Cadence Sensor
CONFIG_BT_DEVICE_APPEARANCE=1157
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=0
CONFIG_BT_GATT_CLIENT=n
CONFIG_BT_BAS=y
CONFIG_BT_DIS=y

# --- Lean controller: peripheral-only SoftDevice Controller ---
CONFIG_BT_LL_SOFTDEVICE=y
CONFIG_BT_LL_SOFTDEVICE_PERIPHERAL=y

# --- Shrink BLE buffers / drop costly features (fit 24 KB RAM) ---
CONFIG_BT_BUF_ACL_TX_SIZE=27
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_BUF_EVT_RX_COUNT=4
CONFIG_BT_L2CAP_TX_BUF_COUNT=2
CONFIG_BT_ATT_TX_COUNT=2
CONFIG_BT_DATA_LEN_UPDATE=n
CONFIG_BT_PHY_UPDATE=n
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_GATT_CACHING=n
CONFIG_BT_GATT_SERVICE_CHANGED=n

# --- Peripherals ---
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_ADC=y

# --- Size optimisation ---
CONFIG_SIZE_OPTIMIZATIONS=y

# --- Debug over SEGGER RTT (J-Link); no UART pins. (disable for production power) ---
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y
CONFIG_LOG=n
